<svg xmlns="http://www.w3.org/2000/svg" width="820" height="180" viewBox="0 0 820 180" role="img" aria-labelledby="title desc">
  <title id="title">CV Maker logo</title>
  <desc id="desc">Professional CV Maker wordmark with a document and ink pen icon.</desc>
  <defs>
    <linearGradient id="markGradient" x1="20" y1="18" x2="146" y2="158" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="0.55" stop-color="#4f46e5"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="penGradient" x1="66" y1="116" x2="130" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#14b8a6"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
  </defs>

  <g filter="url(#softShadow)">
    <rect x="22" y="18" width="140" height="140" rx="30" fill="url(#markGradient)"/>
    <path d="M63 42h48l30 30v58a12 12 0 0 1-12 12H63a12 12 0 0 1-12-12V54a12 12 0 0 1 12-12Z" fill="#fff" opacity="0.97"/>
    <path d="M111 43v22a8 8 0 0 0 8 8h21" fill="#dbeafe"/>
    <path d="M72 86h42M72 105h30M72 124h22" stroke="#1e3a8a" stroke-width="8" stroke-linecap="round" opacity="0.78"/>
    <path d="M111 118 132 97a9 9 0 0 0 0-13l-2-2a9 9 0 0 0-13 0l-21 21-6 22 21-7Z" fill="url(#penGradient)"/>
    <path d="M113 85 130 102" stroke="#fff" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
  </g>

  <g>
    <text x="195" y="92" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="62" font-weight="800" fill="#0f172a">CV Maker</text>
    <text x="197" y="132" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="30" font-weight="600" fill="#2563eb">cvmaker.ink</text>
    <path d="M196 148h232" stroke="#14b8a6" stroke-width="8" stroke-linecap="round"/>
  </g>
