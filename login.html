<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - cvmaker.ink</title>
  <meta name="description" content="Sign in to your cvmaker.ink account to manage your resumes, edit your profile, and continue building professional resumes online.">
  <meta property="og:title" content="Sign In - cvmaker.ink">
  <meta property="og:description" content="Sign in to your cvmaker.ink account to manage your resumes, edit your profile, and continue building professional resumes online.">
  <meta property="og:image" content="https://cvmaker.ink/assets/og-default.jpg">
  <meta property="og:url" content="https://cvmaker.ink/login.html">
  <link rel="canonical" href="https://cvmaker.ink/login.html">
    <!-- Tracking Code Loader -->
    <script src="/assets/js/tracking-loader.js"></script>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    .error { background: #fee2e2; color: #dc2626; padding: 12px; border-radius: 8px; margin-bottom: 16px; }
    .success { background: #dcfce7; color: #16a34a; padding: 12px; border-radius: 8px; margin-bottom: 16px; }
  </style>
  <script src="/branding.js"></script>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8">
    <!-- Logo -->
    <div class="text-center mb-8">
      <a href="/" class="inline-flex items-center justify-center">
        <img src="/uploads/branding/cvmaker-logo-20260515.svg" alt="cvmaker.ink" class="w-full max-w-[380px] h-auto object-contain mx-auto" />
      </a>
      <p class="text-gray-600 mt-2">Welcome back!</p>
    </div>

    <!-- Messages -->
    <div id="message"></div>

    <!-- Form -->
    <form id="loginForm" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
        <input type="email" name="email" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <div class="relative">
          <input type="password" name="password" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 pr-10">
          <button type="button" onclick="togglePassword()" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400">
            <i class="fas fa-eye" id="eyeIcon"></i>
          </button>
        </div>
      </div>

      <div class="flex items-center justify-between">
        <label class="flex items-center">
          <input type="checkbox" class="rounded border-gray-300 text-blue-600">
          <span class="ml-2 text-sm text-gray-600">Remember me</span>
        </label>
        <a href="/forgot-password.html" class="text-sm text-blue-600 hover:text-blue-700">Forgot password?</a>
      </div>

      <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition">
        Sign In
      </button>
    </form>

    <div class="mt-6 text-center">
      <p class="text-gray-600">Don't have an account? <a href="/register.html" class="text-blue-600 font-medium">Sign up</a></p>
    </div>
  </div>

  <script>
    function togglePassword() {
      const input = document.querySelector('input[name="password"]');
      const icon = document.getElementById('eyeIcon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
      } else {
        input.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
      }
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const btn = document.getElementById('submitBtn');
      const msgDiv = document.getElementById('message');
      
      btn.textContent = 'Signing in...';
      btn.disabled = true;
      msgDiv.innerHTML = '';
      
      const formData = new FormData(e.target);
      const data = {
        email: formData.get('email'),
        password: formData.get('password')
      };
      
      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        
        const result = await response.json();
        
        if (response.ok) {
          msgDiv.innerHTML = '<div class="success">✅ Login Successfully!</div>';
          localStorage.setItem('token', result.token);
          localStorage.setItem('user', JSON.stringify(result.user));
          setTimeout(() => window.location.href = '/dashboard.html', 1500);
        } else {
          msgDiv.innerHTML = `<div class="error">❌ ${result.error || 'Login failed'}</div>`;
          btn.textContent = 'Sign In';
          btn.disabled = false;
        }
      } catch (err) {
        msgDiv.innerHTML = '<div class="error">❌ Network error. Please try again.</div>';
        btn.textContent = 'Sign In';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
