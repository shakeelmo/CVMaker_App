<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - cvmaker.ink</title>
  <meta name="description" content="Reset your cvmaker.ink account password.">
  <meta name="robots" content="noindex, nofollow">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    .error { background: #fee2e2; color: #dc2626; padding: 12px; border-radius: 8px; margin-bottom: 16px; }
    .success { background: #dcfce7; color: #16a34a; padding: 12px; border-radius: 8px; margin-bottom: 16px; }
    .info { background: #dbeafe; color: #1d4ed8; padding: 12px; border-radius: 8px; margin-bottom: 16px; }
  </style>
  <script src="/branding.js"></script>
  <script src="/assets/js/tracking-loader.js"></script>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8">
    <!-- Logo -->
    <div class="text-center mb-8">
      <a href="/" class="inline-flex items-center justify-center">
        <img src="/uploads/branding/cvmaker-logo-20260515.svg" alt="cvmaker.ink" class="w-full max-w-[380px] h-auto object-contain mx-auto" />
      </a>
      <h2 class="text-xl font-semibold text-gray-800 mt-4">Forgot your password?</h2>
      <p class="text-gray-600 mt-1 text-sm">Enter your email and we'll send you a reset link.</p>
    </div>

    <!-- Messages -->
    <div id="message"></div>

    <!-- Form -->
    <form id="forgotForm" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
        <input type="email" name="email" required placeholder="you@example.com"
          class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
      </div>

      <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition">
        Send Reset Link
      </button>
    </form>

    <div class="mt-6 text-center">
      <p class="text-gray-600"><a href="/login.html" class="text-blue-600 font-medium hover:text-blue-700"><i class="fas fa-arrow-left mr-1"></i>Back to Sign In</a></p>
    </div>
  </div>

  <script>
    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const btn = document.getElementById('submitBtn');
      const msgDiv = document.getElementById('message');
      const form = document.getElementById('forgotForm');

      btn.textContent = 'Sending...';
      btn.disabled = true;
      msgDiv.innerHTML = '';

      const formData = new FormData(e.target);
      const data = { email: formData.get('email') };

      try {
        const response = await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        const result = await response.json();

        if (response.ok) {
          form.classList.add('hidden');
          msgDiv.innerHTML = `
            <div class="success">
              <h3 class="font-bold text-lg mb-2"><i class="fas fa-check-circle mr-2"></i>Check Your Email</h3>
              <p>${result.message}</p>
            </div>
            <p class="text-sm text-gray-500 mt-3">Didn't receive the email? Check your spam folder or <a href="/forgot-password.html" class="text-blue-600 hover:text-blue-700">try again</a>.</p>
          `;
        } else {
          msgDiv.innerHTML = `<div class="error">❌ ${result.error || 'Something went wrong. Please try again.'}</div>`;
          btn.textContent = 'Send Reset Link';
          btn.disabled = false;
        }
      } catch (err) {
        msgDiv.innerHTML = `<div class="error">❌ Network error. Please try again.</div>`;
        btn.textContent = 'Send Reset Link';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
