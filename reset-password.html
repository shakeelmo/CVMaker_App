<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - cvmaker.ink</title>
  <meta name="description" content="Set a new password for your CVMaker.ink account.">
  <meta name="robots" content="noindex, nofollow">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    .error { background: #fee2e2; color: #dc2626; padding: 12px; border-radius: 8px; margin-bottom: 16px; }
    .success { background: #dcfce7; color: #16a34a; padding: 12px; border-radius: 8px; margin-bottom: 16px; }
    .info { background: #dbeafe; color: #1d4ed8; padding: 12px; border-radius: 8px; margin-bottom: 16px; }
    .password-strength { height: 4px; border-radius: 2px; margin-top: 6px; transition: all 0.3s; }
  </style>
  <script src="/branding.js"></script>
  <script src="/assets/js/tracking-loader.js"></script>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8">
    <!-- Logo -->
    <div class="text-center mb-8">
      <a href="/" class="inline-flex items-center justify-center">
        <img src="/uploads/branding/cvmaker-logo-20260515.svg" alt="cvmaker.ink" class="w-full max-w-[380px] h-auto object-contain mx-auto" />
      </a>
      <h2 class="text-xl font-semibold text-gray-800 mt-4">Set New Password</h2>
      <p class="text-gray-600 mt-1 text-sm">Choose a new password for your account.</p>
    </div>

    <!-- Messages -->
    <div id="message"></div>

    <!-- Invalid/expired token state -->
    <div id="expiredState" class="hidden text-center">
      <i class="fas fa-exclamation-triangle text-5xl text-red-400 mb-4"></i>
      <p class="text-gray-700 mb-4" id="expiredMsg"></p>
      <a href="/forgot-password.html" class="inline-block bg-blue-600 text-white px-6 py-3 rounded-lg font-semibold hover:bg-blue-700 transition">
        Request New Reset Link
      </a>
      <div class="mt-4">
        <a href="/login.html" class="text-blue-600 font-medium hover:text-blue-700">Back to Sign In</a>
      </div>
    </div>

    <!-- Success state -->
    <div id="successState" class="hidden text-center">
      <i class="fas fa-check-circle text-5xl text-green-500 mb-4"></i>
      <p class="text-gray-700 mb-4">Your password has been reset successfully!</p>
      <a href="/login.html" class="inline-block bg-blue-600 text-white px-6 py-3 rounded-lg font-semibold hover:bg-blue-700 transition">
        Sign In Now
      </a>
    </div>

    <!-- Form -->
    <form id="resetForm" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">New Password</label>
        <div class="relative">
          <input type="password" name="password" id="password" required minlength="8" placeholder="At least 8 characters"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 pr-10">
          <button type="button" onclick="togglePassword('password', 'eyeIcon1')" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400">
            <i class="fas fa-eye" id="eyeIcon1"></i>
          </button>
        </div>
        <div id="strengthBar" class="password-strength bg-gray-200"></div>
        <p id="strengthText" class="text-xs text-gray-500 mt-1"></p>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Confirm New Password</label>
        <div class="relative">
          <input type="password" name="confirmPassword" id="confirmPassword" required minlength="8" placeholder="Repeat your password"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 pr-10">
          <button type="button" onclick="togglePassword('confirmPassword', 'eyeIcon2')" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400">
            <i class="fas fa-eye" id="eyeIcon2"></i>
          </button>
        </div>
        <p id="matchText" class="text-xs mt-1"></p>
      </div>

      <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition">
        Reset Password
      </button>
    </form>

    <div class="mt-6 text-center">
      <p class="text-gray-600"><a href="/login.html" class="text-blue-600 font-medium hover:text-blue-700"><i class="fas fa-arrow-left mr-1"></i>Back to Sign In</a></p>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    if (!token) {
      document.getElementById('resetForm').classList.add('hidden');
      document.getElementById('expiredState').classList.remove('hidden');
      document.getElementById('expiredMsg').textContent = 'This password reset link is invalid. Please request a new one.';
    }

    function togglePassword(inputId, iconId) {
      const input = document.getElementById(inputId);
      const icon = document.getElementById(iconId);
      if (input.type === 'password') {
        input.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
      } else {
        input.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
      }
    }

    // Password strength indicator
    document.getElementById('password').addEventListener('input', function() {
      const val = this.value;
      const bar = document.getElementById('strengthBar');
      const text = document.getElementById('strengthText');

      if (val.length === 0) {
        bar.style.width = '0%';
        bar.className = 'password-strength bg-gray-200';
        text.textContent = '';
        return;
      }

      let strength = 0;
      if (val.length >= 8) strength++;
      if (val.length >= 12) strength++;
      if (/[A-Z]/.test(val)) strength++;
      if (/[0-9]/.test(val)) strength++;
      if (/[^A-Za-z0-9]/.test(val)) strength++;

      const levels = [
        { width: '20%', color: 'bg-red-500', label: 'Very Weak' },
        { width: '40%', color: 'bg-orange-500', label: 'Weak' },
        { width: '60%', color: 'bg-yellow-500', label: 'Fair' },
        { width: '80%', color: 'bg-green-400', label: 'Strong' },
        { width: '100%', color: 'bg-green-600', label: 'Very Strong' }
      ];

      const level = levels[Math.min(strength, levels.length) - 1] || levels[0];
      bar.style.width = level.width;
      bar.className = 'password-strength ' + level.color;
      text.textContent = level.label;
      text.className = 'text-xs mt-1 ' + level.color.replace('bg-', 'text-').replace('-500', '-600').replace('-400', '-500');
    });

    // Password match indicator
    document.getElementById('confirmPassword').addEventListener('input', function() {
      const pass = document.getElementById('password').value;
      const confirm = this.value;
      const matchText = document.getElementById('matchText');

      if (confirm.length === 0) {
        matchText.textContent = '';
        return;
      }

      if (pass === confirm) {
        matchText.textContent = '✓ Passwords match';
        matchText.className = 'text-xs mt-1 text-green-600';
      } else {
        matchText.textContent = '✗ Passwords do not match';
        matchText.className = 'text-xs mt-1 text-red-500';
      }
    });

    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const btn = document.getElementById('submitBtn');
      const msgDiv = document.getElementById('message');
      const form = document.getElementById('resetForm');

      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      // Client-side validation
      if (password.length < 8) {
        msgDiv.innerHTML = '<div class="error">❌ Password must be at least 8 characters.</div>';
        return;
      }

      if (password !== confirmPassword) {
        msgDiv.innerHTML = '<div class="error">❌ Passwords do not match.</div>';
        return;
      }

      btn.textContent = 'Resetting...';
      btn.disabled = true;
      msgDiv.innerHTML = '';

      try {
        const response = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: token, password: password })
        });

        const result = await response.json();

        if (response.ok) {
          form.classList.add('hidden');
          document.getElementById('successState').classList.remove('hidden');
        } else {
          if (result.expired) {
            form.classList.add('hidden');
            document.getElementById('expiredState').classList.remove('hidden');
            document.getElementById('expiredMsg').textContent = result.error || 'This reset link has expired.';
          } else {
            msgDiv.innerHTML = `<div class="error">❌ ${result.error || 'Something went wrong. Please try again.'}</div>`;
            btn.textContent = 'Reset Password';
            btn.disabled = false;
          }
        }
      } catch (err) {
        msgDiv.innerHTML = '<div class="error">❌ Network error. Please try again.</div>';
        btn.textContent = 'Reset Password';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
