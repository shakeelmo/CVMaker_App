<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CVMaker.ink Preview - cvmaker.ink</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    .resume-container {
      width: 210mm;
      min-height: 297mm;
      margin: 0 auto;
      background: white;
      box-shadow: 0 0 20px rgba(0,0,0,0.1);
      position: relative;
      padding-bottom: 24mm;
      box-sizing: border-box;
    }
    .resume-container,
    .resume-container * {
      box-sizing: border-box;
    }
    .resume-container p,
    .resume-container .plain-text,
    .resume-container .summary-text,
    .resume-container .bullet,
    .resume-container .contact,
    .resume-container .sidebar-item,
    .resume-container .skill-tag,
    .resume-container .exp-company,
    .resume-container .exp-header span {
      overflow-wrap: anywhere;
      word-break: normal;
    }
    .resume-container p {
      margin: 0;
      font-size: 13px;
      line-height: 1.6;
      color: #111827;
    }
    body.embed-preview {
      margin: 0;
      overflow-x: hidden;
      background: white;
    }
    body.embed-preview #resumeContainer {
      width: 100%;
      overflow: hidden;
    }
    body.embed-preview .resume-container {
      transform-origin: top center;
      box-shadow: none;
    }
    .pdf-export-root {
      position: absolute;
      left: 0;
      top: 0;
      width: 794px;
      background: #fff;
      z-index: 999999;
    }
    .pdf-export-root .resume-container {
      width: 794px !important;
      min-height: 1123px !important;
      margin: 0 !important;
      box-shadow: none !important;
      transform: none !important;
    }
    .pdf-watermark {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 8mm;
      text-align: center;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: lowercase;
      color: rgba(107, 114, 128, 0.85);
    }
    @media print {
      body { background: white; }
      .no-print { display: none !important; }
      .resume-container { box-shadow: none; margin: 0; width: 100%; }
    }
    
    /* Template Styles */
    .template-modern { }
    .template-modern .header { text-align: center; border-bottom: 2px solid var(--primary); padding: 30px; }
    .template-modern .name { font-size: 32px; font-weight: 700; color: var(--primary); }
    .template-modern .title { font-size: 18px; color: #666; margin-top: 5px; }
    .template-modern .contact { margin-top: 15px; font-size: 13px; color: #666; }
    .template-modern .section { padding: 20px 30px; }
    .template-modern .section-title { font-size: 14px; font-weight: 700; color: var(--primary); border-bottom: 1px solid var(--primary); padding-bottom: 8px; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }
    .template-modern .skills-list { display: flex; flex-wrap: wrap; gap: 8px; }
    .template-modern .skill-tag { background: #f0f4ff; color: var(--primary); padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; }
    .template-modern .experience-item { margin-bottom: 20px; }
    .template-modern .exp-header { display: flex; justify-content: space-between; font-weight: 600; }
    .template-modern .exp-company { color: var(--primary); font-weight: 500; }
    .template-modern .exp-date { color: #666; font-size: 12px; }
    .template-modern .bullet { margin: 5px 0 5px 20px; font-size: 13px; line-height: 1.5; }

    .template-classic .header { padding: 24px 30px 18px; border-bottom: 3px solid #111827; text-align: left; }
    .template-classic .name { font-size: 30px; font-weight: 700; color: #111827; letter-spacing: 0.02em; }
    .template-classic .title { font-size: 16px; color: #374151; margin-top: 6px; }
    .template-classic .contact { margin-top: 12px; font-size: 12px; color: #4b5563; }
    .template-classic .section { padding: 18px 30px; }
    .template-classic .section-title { font-size: 13px; font-weight: 700; color: #111827; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.14em; }
    .template-classic .skills-list { display: block; }
    .template-classic .skill-tag { display: inline-block; margin: 0 10px 8px 0; font-size: 12px; color: #111827; background: #f3f4f6; padding: 4px 10px; border-radius: 4px; }
    .template-classic .experience-item { margin-bottom: 18px; }
    .template-classic .exp-header { display: flex; justify-content: space-between; gap: 12px; font-weight: 700; color: #111827; }
    .template-classic .exp-company { color: #374151; font-style: italic; margin-top: 2px; }
    .template-classic .exp-date { color: #4b5563; font-size: 12px; white-space: nowrap; }
    .template-classic .bullet { margin: 5px 0 5px 18px; font-size: 13px; line-height: 1.55; }

    .template-minimal .header { padding: 26px 30px 14px; text-align: left; }
    .template-minimal .name { font-size: 28px; font-weight: 300; color: #111827; }
    .template-minimal .title { font-size: 15px; color: #6b7280; margin-top: 4px; }
    .template-minimal .contact { margin-top: 10px; font-size: 12px; color: #6b7280; }
    .template-minimal .section { padding: 14px 30px; }
    .template-minimal .section-title { font-size: 12px; font-weight: 700; color: var(--primary); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.18em; }
    .template-minimal .skills-list { display: flex; flex-wrap: wrap; gap: 6px; }
    .template-minimal .skill-tag { background: transparent; color: #111827; border: 1px solid #d1d5db; padding: 4px 10px; border-radius: 999px; font-size: 11px; }
    .template-minimal .experience-item { margin-bottom: 16px; }
    .template-minimal .exp-header { display: block; font-weight: 600; color: #111827; }
    .template-minimal .exp-company { color: #6b7280; margin-top: 2px; }
    .template-minimal .exp-date { color: #9ca3af; font-size: 12px; display: block; margin-top: 2px; }
    .template-minimal .bullet { margin: 4px 0 4px 16px; font-size: 12.5px; line-height: 1.5; color: #374151; }

    .template-creative .header { padding: 28px 30px 20px; background: linear-gradient(135deg, var(--primary), #111827); color: white; text-align: left; }
    .template-creative .name { font-size: 31px; font-weight: 700; }
    .template-creative .title { font-size: 16px; color: rgba(255,255,255,0.88); margin-top: 6px; }
    .template-creative .contact { margin-top: 12px; font-size: 12px; color: rgba(255,255,255,0.85); }
    .template-creative .section { padding: 18px 30px; }
    .template-creative .section-title { font-size: 13px; font-weight: 700; color: var(--primary); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.14em; }
    .template-creative .skills-list { display: flex; flex-wrap: wrap; gap: 8px; }
    .template-creative .skill-tag { background: rgba(37,99,235,0.08); color: var(--primary); padding: 5px 12px; border-radius: 999px; font-size: 11px; font-weight: 600; }
    .template-creative .experience-item { margin-bottom: 18px; }
    .template-creative .exp-header { display: flex; justify-content: space-between; gap: 12px; font-weight: 700; }
    .template-creative .exp-company { color: #6b7280; margin-top: 3px; }
    .template-creative .exp-date { color: #6b7280; font-size: 12px; }
    .template-creative .bullet { margin: 5px 0 5px 18px; font-size: 13px; line-height: 1.55; }

    .template-executive .header { padding: 24px 30px; border-top: 6px solid #111827; text-align: left; }
    .template-executive .name { font-size: 32px; font-weight: 700; color: #111827; }
    .template-executive .title { font-size: 17px; color: #374151; margin-top: 6px; }
    .template-executive .contact { margin-top: 12px; font-size: 12px; color: #4b5563; }
    .template-executive .section { padding: 18px 30px; }
    .template-executive .section-title { font-size: 13px; font-weight: 700; color: #111827; border-bottom: 2px solid #d1d5db; padding-bottom: 6px; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.14em; }
    .template-executive .skills-list { display: flex; flex-wrap: wrap; gap: 8px; }
    .template-executive .skill-tag { background: #f9fafb; color: #111827; border: 1px solid #e5e7eb; padding: 4px 11px; border-radius: 4px; font-size: 11px; }
    .template-executive .experience-item { margin-bottom: 18px; }
    .template-executive .exp-header { display: flex; justify-content: space-between; gap: 12px; font-weight: 700; color: #111827; }
    .template-executive .exp-company { color: #374151; margin-top: 2px; }
    .template-executive .exp-date { color: #6b7280; font-size: 12px; }
    .template-executive .bullet { margin: 5px 0 5px 18px; font-size: 13px; line-height: 1.55; }

    .template-glalie { display: grid; grid-template-columns: 30% 70%; min-height: 297mm; }
    .template-glalie .sidebar { background: #d9e8e8; padding: 22px 18px; }
    .template-glalie .main { padding: 22px 28px; }
    .template-glalie .photo { width: 120px; height: 120px; border-radius: 8px; background: #cbd5e1; margin: 0 auto 16px; overflow: hidden; }
    .template-glalie .photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .template-glalie .name { font-size: 28px; font-weight: 700; color: #111827; text-align: center; }
    .template-glalie .title { font-size: 14px; color: #374151; margin-top: 6px; text-align: center; }
    .template-glalie .sidebar-card { border: 1px solid rgba(15,23,42,0.18); border-radius: 6px; padding: 10px 12px; margin: 16px 0; background: rgba(255,255,255,0.15); }
    .template-glalie .sidebar-section { margin-top: 18px; }
    .template-glalie .sidebar-title { font-size: 12px; font-weight: 700; color: #275b5b; text-transform: uppercase; border-bottom: 1px solid rgba(39,91,91,0.35); padding-bottom: 6px; margin-bottom: 10px; }
    .template-glalie .sidebar-item { font-size: 12px; color: #1f2937; margin-bottom: 10px; line-height: 1.45; }
    .template-glalie .main .section { padding: 0 0 18px; }
    .template-glalie .section-title { font-size: 13px; font-weight: 700; color: #111827; text-transform: uppercase; border-bottom: 1px solid #374151; padding-bottom: 4px; margin-bottom: 10px; }
    .template-glalie .experience-item { margin-bottom: 16px; }
    .template-glalie .exp-header { display: flex; justify-content: space-between; gap: 12px; font-weight: 700; color: #111827; }
    .template-glalie .exp-company { color: #111827; margin-top: 2px; font-weight: 600; }
    .template-glalie .exp-date { color: #374151; font-size: 12px; white-space: nowrap; }
    .template-glalie .bullet { margin: 5px 0 5px 16px; font-size: 13px; line-height: 1.55; color: #374151; }
    .template-glalie .plain-text { font-size: 13px; line-height: 1.6; color: #1f2937; }
    
    /* Gengar Template - Two column with dark sidebar */
    .template-gengar { display: grid; grid-template-columns: 35% 65%; min-height: 297mm; }
    .template-gengar .sidebar { background: #1e293b; color: #fff; padding: 28px 20px; }
    .template-gengar .main { padding: 28px 28px; background: #fff; }
    .template-gengar .photo { width: 100px; height: 100px; border-radius: 50%; background: #334155; margin: 0 auto 20px; overflow: hidden; border: 3px solid #475569; }
    .template-gengar .photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .template-gengar .sidebar .name { font-size: 22px; font-weight: 700; color: #fff; text-align: center; }
    .template-gengar .sidebar .title { font-size: 13px; color: #94a3b8; margin-top: 6px; text-align: center; text-transform: uppercase; letter-spacing: 1px; }
    .template-gengar .sidebar .location { font-size: 12px; color: #64748b; margin-top: 4px; text-align: center; }
    .template-gengar .sidebar-section { margin-top: 24px; }
    .template-gengar .sidebar-title { font-size: 11px; font-weight: 700; color: #fff; text-transform: uppercase; letter-spacing: 1.5px; border-bottom: 2px solid #475569; padding-bottom: 8px; margin-bottom: 12px; }
    .template-gengar .sidebar-item { font-size: 12px; color: #e2e8f0; margin-bottom: 10px; line-height: 1.5; }
    .template-gengar .sidebar-item-label { font-size: 10px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
    .template-gengar .skill-item { margin-bottom: 12px; }
    .template-gengar .skill-name { font-size: 12px; color: #e2e8f0; margin-bottom: 4px; }
    .template-gengar .skill-bar { height: 4px; background: #334155; border-radius: 2px; overflow: hidden; }
    .template-gengar .skill-bar-fill { height: 100%; background: #60a5fa; border-radius: 2px; }
    .template-gengar .social-links { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
    .template-gengar .social-link { font-size: 12px; color: #e2e8f0; display: flex; align-items: center; gap: 8px; }
    .template-gengar .social-link i { width: 16px; color: #60a5fa; }
    .template-gengar .main .header { padding: 0 0 20px; border-bottom: 2px solid #1e293b; margin-bottom: 20px; }
    .template-gengar .main .name { font-size: 32px; font-weight: 700; color: #1e293b; }
    .template-gengar .main .title { font-size: 16px; color: #475569; margin-top: 6px; }
    .template-gengar .main .section { padding: 0 0 20px; }
    .template-gengar .main .section-title { font-size: 14px; font-weight: 700; color: #1e293b; text-transform: uppercase; letter-spacing: 1px; border-bottom: 2px solid #e2e8f0; padding-bottom: 8px; margin-bottom: 14px; }
    .template-gengar .experience-item { margin-bottom: 18px; }
    .template-gengar .exp-header { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; font-weight: 700; color: #1e293b; font-size: 14px; }
    .template-gengar .exp-company { color: #475569; margin-top: 4px; font-size: 13px; }
    .template-gengar .exp-date { color: #64748b; font-size: 12px; white-space: nowrap; }
    .template-gengar .bullet { margin: 6px 0 6px 16px; font-size: 13px; line-height: 1.55; color: #374151; }
    .template-gengar .summary-text { font-size: 14px; line-height: 1.7; color: #374151; }
    
    /* Loading */
    .loading { display: flex; justify-content: center; align-items: center; height: 100vh; }
    .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-gray-100">
  <!-- Controls -->
  <div class="no-print fixed top-0 left-0 right-0 bg-white shadow-md z-50 px-6 py-4">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
      <div class="flex items-center gap-4">
        <a href="javascript:history.back()" class="text-gray-600 hover:text-gray-900">
          <i class="fas fa-arrow-left"></i> Back
        </a>
        <h1 class="text-xl font-bold">CVMaker.ink Preview</h1>
      </div>
      <div class="flex gap-3">
        <select id="templateSelect" onchange="changeTemplate()" class="px-4 py-2 border rounded-lg">
          <option value="modern">Modern Professional</option>
          <option value="classic">Classic Elegant</option>
          <option value="minimal">Minimal Clean</option>
          <option value="creative">Creative Bold</option>
          <option value="executive">Executive Premium</option>
          <option value="glalie">Glalie</option>
          <option value="gengar">Gengar</option>
        </select>
        <button onclick="downloadPDF()" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 flex items-center gap-2">
          <i class="fas fa-download"></i> Download PDF
        </button>
        <button onclick="window.print()" class="bg-gray-600 text-white px-6 py-2 rounded-lg hover:bg-gray-700 flex items-center gap-2">
          <i class="fas fa-print"></i> Print
        </button>
      </div>
    </div>
  </div>

  <!-- Loading -->
  <div id="loading" class="loading">
    <div class="text-center">
      <div class="spinner mx-auto mb-4"></div>
      <p class="text-gray-600">Loading resume...</p>
    </div>
  </div>

  <!-- CVMaker.ink Preview -->
  <div id="resumeContainer" class="hidden pt-24 pb-10 px-4">
    <div id="resume" class="resume-container"></div>
  </div>

  <script>
    let resumeData = null;
    let currentTemplate = 'modern';
    let currentUser = null;
    let embedMode = false;
    
    // Load resume on page load
    document.addEventListener('DOMContentLoaded', async function() {
      const params = new URLSearchParams(window.location.search);
      const resumeId = params.get('id') || params.get('resume');
      embedMode = params.get('embed') === '1';
      currentUser = JSON.parse(localStorage.getItem('user') || 'null');

      if (embedMode) {
        document.body.classList.remove('bg-gray-100');
        document.body.classList.add('bg-white');
        document.body.classList.add('embed-preview');
        document.querySelectorAll('.no-print').forEach(el => el.remove());
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('resumeContainer').classList.remove('hidden');
        document.getElementById('resumeContainer').classList.remove('pt-24', 'pb-10', 'px-4');
        window.addEventListener('message', handleEmbedMessage);
        window.addEventListener('resize', fitEmbedPreview);
        if (window.parent !== window) {
          window.parent.postMessage({ type: 'preview-ready' }, '*');
        }
        return;
      }
      
      if (!resumeId) {
        alert('No resume ID provided');
        return;
      }
      
      const token = localStorage.getItem('token');
      if (!token) {
        window.location.href = '/login.html';
        return;
      }
      
      try {
        const response = await fetch(`/api/resumes/${resumeId}`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        
        if (!response.ok) throw new Error('Failed to load');
        
        const data = await response.json();
        if (data.resume) {
          resumeData = typeof data.resume.content === 'string' 
            ? JSON.parse(data.resume.content) 
            : data.resume.content;
          
          currentTemplate = resumeData.template || 'modern';
          document.getElementById('templateSelect').value = currentTemplate;
          
          renderResume();
          
          document.getElementById('loading').classList.add('hidden');
          document.getElementById('resumeContainer').classList.remove('hidden');

          if (params.get('download') === '1') {
            setTimeout(() => downloadPDF(true), 600);
          }
        }
      } catch (err) {
        console.error(err);
        alert('Error loading resume');
      }
    });

    function handleEmbedMessage(event) {
      const message = event.data || {};
      if (message.type !== 'resume-preview-data') return;
      resumeData = message.resumeData || null;
      currentTemplate = message.template || resumeData?.template || 'modern';
      renderResume();
    }

    function fitEmbedPreview() {
      if (!embedMode) return;
      const outer = document.getElementById('resumeContainer');
      const resume = document.getElementById('resume');
      if (!outer || !resume) return;

      resume.style.transform = '';
      outer.style.height = '';

      const availableWidth = outer.clientWidth;
      const pageWidth = resume.offsetWidth;
      if (!availableWidth || !pageWidth) return;

      const scale = Math.min(1, availableWidth / pageWidth);
      resume.style.transform = `scale(${scale})`;
      outer.style.height = `${resume.scrollHeight * scale}px`;
    }

    function finalizeResumeRender() {
      if (embedMode) {
        requestAnimationFrame(fitEmbedPreview);
      }
    }

    function getPresetSectionOrder(preset = 'skills-first') {
      if (preset === 'experience-first') {
        return ['summary', 'experience', 'skills', 'projects', 'certifications', 'education', 'languages'];
      }
      if (preset === 'education-first') {
        return ['summary', 'education', 'skills', 'experience', 'projects', 'certifications', 'languages'];
      }
      return ['summary', 'skills', 'experience', 'projects', 'certifications', 'education', 'languages'];
    }

    function getOrderedResumeSections() {
      const validKeys = ['summary', 'skills', 'experience', 'education', 'certifications', 'projects', 'languages'];
      const settings = resumeData?.settings || {};
      const hidden = new Set(Array.isArray(settings.hiddenSections) ? settings.hiddenSections : []);
      let order = Array.isArray(settings.sectionOrderList)
        ? settings.sectionOrderList.filter(key => validKeys.includes(key))
        : getPresetSectionOrder(settings.sectionOrder);

      validKeys.forEach(key => {
        if (!order.includes(key)) order.push(key);
      });

      return order.filter(key => !hidden.has(key));
    }

    function isSectionVisible(key) {
      return getOrderedResumeSections().includes(key);
    }

    function renderOrderedSections() {
      const renderers = {
        summary: () => resumeData.summary ? `
          <div class="section">
            <div class="section-title">Professional Summary</div>
            <p>${resumeData.summary}</p>
          </div>
        ` : '',
        skills: () => resumeData.skills?.length ? `
          <div class="section">
            <div class="section-title">Skills</div>
            <div class="skills-list">
              ${resumeData.skills.map(s => `<span class="skill-tag">${s.name}</span>`).join('')}
            </div>
          </div>
        ` : '',
        experience: () => resumeData.experience?.length ? `
          <div class="section">
            <div class="section-title">Work Experience</div>
            ${resumeData.experience.map(exp => `
              <div class="experience-item">
                <div class="exp-header">
                  <span>${exp.position || ''}</span>
                  <span class="exp-date">${[exp.startDate, exp.endDate || 'Present'].filter(Boolean).join(' - ')}</span>
                </div>
                <div class="exp-company">${exp.company || ''}${exp.location ? `, ${exp.location}` : ''}</div>
                ${exp.bullets?.filter(b => b).map(b => `<div class="bullet">• ${b}</div>`).join('') || ''}
              </div>
            `).join('')}
          </div>
        ` : '',
        education: () => resumeData.education?.length ? `
          <div class="section">
            <div class="section-title">Education</div>
            ${resumeData.education.map(edu => `
              <div class="experience-item">
                <div class="exp-header">
                  <span>${edu.school || ''}</span>
                  <span class="exp-date">${edu.graduationDate || ''}</span>
                </div>
                <div>${edu.degree || ''}${edu.field ? `, ${edu.field}` : ''}</div>
              </div>
            `).join('')}
          </div>
        ` : '',
        certifications: () => resumeData.certifications?.length ? `
          <div class="section">
            <div class="section-title">Certifications</div>
            ${resumeData.certifications.map(cert => {
              const meta = [cert.issuer, cert.date].filter(Boolean).join(' • ');

    const PDF_PAGE = {
      widthMm: 210,
      heightMm: 297,
      widthPx: 794,
      heightPx: 1123
    };

    function waitForImages(element) {
      const images = Array.from(element.querySelectorAll('img'));
      return Promise.all(images.map(img => {
        if (img.complete) return Promise.resolve();
        return new Promise(resolve => {
          img.onload = resolve;
          img.onerror = resolve;
        });
      }));
    }

    function createPdfExportElement() {
      const source = document.getElementById('resume');
      const root = document.createElement('div');
      const clone = source.cloneNode(true);
      root.className = 'pdf-export-root';
      clone.id = 'resumePdfExport';
      clone.style.width = `${PDF_PAGE.widthPx}px`;
      clone.style.minHeight = `${PDF_PAGE.heightPx}px`;
      clone.style.margin = '0';
      clone.style.boxShadow = 'none';
      clone.style.transform = 'none';
      root.appendChild(clone);
      document.body.appendChild(root);
      return { root, clone };
    }

    function isCanvasAreaBlank(canvas, y, height) {
      const ctx = canvas.getContext('2d', { willReadFrequently: true });
      const sampleStep = 18;
      const maxY = Math.min(canvas.height, y + height);

      for (let yy = y; yy < maxY; yy += sampleStep) {
        for (let xx = 0; xx < canvas.width; xx += sampleStep) {
          const pixel = ctx.getImageData(xx, yy, 1, 1).data;
          if (pixel[0] < 248 || pixel[1] < 248 || pixel[2] < 248) {
            return false;
          }
        }
      }

      return true;
    }

    async function saveElementAsPDF(element, filename) {
      if (document.fonts?.ready) {
        await document.fonts.ready;
      }
      await waitForImages(element);

      const canvas = await html2canvas(element, {
        scale: 2,
        useCORS: true,
        allowTaint: false,
        backgroundColor: '#ffffff',
        logging: false,
        width: PDF_PAGE.widthPx,
        windowWidth: PDF_PAGE.widthPx,
        scrollX: 0,
        scrollY: 0
      });

      const JsPDF = window.jspdf?.jsPDF || window.jsPDF;
      if (!JsPDF) {
        throw new Error('PDF engine is not available');
      }

      const pdf = new JsPDF('p', 'mm', 'a4');
      const pageHeightPx = Math.floor(canvas.width * PDF_PAGE.heightMm / PDF_PAGE.widthMm);
      let pageIndex = 0;

      for (let y = 0; y < canvas.height; y += pageHeightPx) {
        const sliceHeight = Math.min(pageHeightPx, canvas.height - y);
        if (pageIndex > 0 && isCanvasAreaBlank(canvas, y, sliceHeight)) {
          continue;
        }

        const pageCanvas = document.createElement('canvas');
        pageCanvas.width = canvas.width;
        pageCanvas.height = sliceHeight;
        const pageCtx = pageCanvas.getContext('2d');
        pageCtx.fillStyle = '#ffffff';
        pageCtx.fillRect(0, 0, pageCanvas.width, pageCanvas.height);
        pageCtx.drawImage(canvas, 0, y, canvas.width, sliceHeight, 0, 0, canvas.width, sliceHeight);

        if (pageIndex > 0) {
          pdf.addPage('a4', 'portrait');
        }

        const imgHeightMm = sliceHeight * PDF_PAGE.widthMm / canvas.width;
        pdf.addImage(pageCanvas.toDataURL('image/jpeg', 0.98), 'JPEG', 0, 0, PDF_PAGE.widthMm, imgHeightMm);
        pageIndex += 1;
      }

      pdf.save(filename);
    }

    async function downloadPDF(autoTriggered = false) {
      const element = document.getElementById('resume');
      if (!element) return;
      const filename = `resume_${new Date().getTime()}.pdf`;
      
      const btn = document.querySelector('button[onclick="downloadPDF()"]');
      const originalText = btn ? btn.innerHTML : '';
      if (btn) {
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Generating...';
        btn.disabled = true;
      }

      let finished = false;
      const timeoutId = setTimeout(() => {
        if (finished) return;
        finished = true;
        if (btn) {
          btn.innerHTML = originalText;
          btn.disabled = false;
        }
        alert('PDF generation is taking too long. Please use Print → Save as PDF instead.');
      }, 20000);
      const { root, clone } = createPdfExportElement();

      saveElementAsPDF(clone, filename).then(() => {
        if (finished) return;
        finished = true;
        clearTimeout(timeoutId);
        if (btn) {
          btn.innerHTML = originalText;
          btn.disabled = false;
        }
        if (autoTriggered) {
          setTimeout(() => window.close(), 800);
        }
      }).catch(err => {
        if (finished) return;
        finished = true;
        clearTimeout(timeoutId);
        console.error(err);
        alert('Error generating PDF. Please try Print → Save as PDF instead.');
        if (btn) {
          btn.innerHTML = originalText;
          btn.disabled = false;
        }
      }).finally(() => {
        root.remove();
      });
    }
  </script>
